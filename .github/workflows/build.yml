name: Build and Release ProjectEye

on:
  # 自动触发条件
  push:
    branches: [ main, master, test ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  
  # 手动触发 - 支持在GitHub网页端手动运行
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'Debug'
        type: choice
        options:
        - Debug
        - Release
      create_release:
        description: '是否创建Release'
        required: false
        default: false
        type: boolean
      release_tag:
        description: 'Release标签 (如: v1.4.4)'
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 验证.NET Framework 4.8环境
      run: |
        # 检查.NET Framework 4.8 Reference Assemblies
        $frameworks = @("v4.8", "v4.7.2", "v4.7.1", "v4.7", "v4.6.2", "v4.6.1", "v4.6")
        $foundFramework = $false
        
        foreach ($fw in $frameworks) {
          $path = "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\$fw"
          if (Test-Path $path) {
            Write-Host "✅ 找到 .NET Framework $fw Reference Assemblies"
            $foundFramework = $true
          }
        }
        
        if (-not $foundFramework) {
          Write-Host "⚠️ 未找到合适的.NET Framework Reference Assemblies"
          Write-Host "尝试列出现有的框架版本："
          Get-ChildItem "C:\Program Files (x86)\Reference Assemblies\Microsoft\Framework\.NETFramework\" -Directory | Sort-Object Name -Descending | Select-Object Name
        }
        
        # GitHub Actions Windows runner通常已包含.NET Framework 4.8
        Write-Host "检查.NET Framework运行时版本："
        Get-ItemProperty "HKLM:SOFTWARE\Microsoft\NET Framework Setup\NDP\v4\Full\" -Name Release -ErrorAction SilentlyContinue | ForEach-Object {
          $release = $_.Release
          if ($release -ge 528040) { Write-Host "✅ .NET Framework 4.8+ 已安装 (Release: $release)" }
          elseif ($release -ge 461808) { Write-Host "✅ .NET Framework 4.7.2+ 已安装 (Release: $release)" }
          else { Write-Host "⚠️ .NET Framework 版本较老 (Release: $release)" }
        }
      continue-on-error: true
    
    - name: 设置.NET Framework构建环境
      uses: microsoft/setup-msbuild@v2
    
    - name: 设置NuGet
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: 'latest'
    
    - name: 设置现代.NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: 清理并恢复NuGet包
      run: |
        cd src/Local/ProjectEye
        
        # 清理之前的包缓存
        dotnet nuget locals all --clear
        
        # 创建packages目录
        if (-not (Test-Path "packages")) { New-Item -ItemType Directory -Name "packages" }
        
        # 恢复现代PackageReference包
        dotnet restore ProjectEye.Local.sln --verbosity normal --force
        
        # 恢复传统packages.config包
        nuget restore ProjectEye.Local.sln -PackagesDirectory packages -Verbosity detailed
        
        # 手动复制关键的Fody包到packages目录（从全局缓存）
        if (Test-Path "$env:USERPROFILE\.nuget\packages\fody\6.9.3") {
          Write-Host "复制Fody 6.9.3到packages目录..."
          Copy-Item "$env:USERPROFILE\.nuget\packages\fody\6.9.3" "packages\Fody.6.9.3" -Recurse -Force
        }
        
        if (Test-Path "$env:USERPROFILE\.nuget\packages\costura.fody\6.0.0") {
          Write-Host "复制Costura.Fody 6.0.0到packages目录..."
          Copy-Item "$env:USERPROFILE\.nuget\packages\costura.fody\6.0.0" "packages\Costura.Fody.6.0.0" -Recurse -Force
        }
        
        # 显示packages目录内容
        Write-Host "Packages目录内容："
        if (Test-Path "packages") { Get-ChildItem packages -Directory | Select-Object Name }
      continue-on-error: false
    
    - name: 构建解决方案
      run: |
        cd src/Local/ProjectEye
        
        $config = if ("${{ github.event.inputs.build_type }}" -eq "") { "Release" } else { "${{ github.event.inputs.build_type }}" }
        Write-Host "构建配置: $config"
        
        # 使用解决方案级别构建以避免OutputPath问题
        Write-Host "开始构建整个解决方案..."
        msbuild ProjectEye.Local.sln /p:Configuration=$config /p:Platform="Any CPU" /verbosity:normal
        
        # 验证构建结果
        Write-Host "验证构建产物..."
        $buildPath = "bin/$config"
        
        if (Test-Path "$buildPath/ProjectEye.exe") {
          Write-Host "✅ ProjectEye.exe 构建成功"
        } else {
          Write-Host "❌ ProjectEye.exe 构建失败"
        }
        
        if (Test-Path "../Project1.UI/bin/$config/Project1.UI.dll") {
          Write-Host "✅ Project1.UI.dll 构建成功"
        } else {
          Write-Host "❌ Project1.UI.dll 构建失败"
        }
        
        if (Test-Path "../ProjectEyeUp/bin/$config/ProjectEyeUp.exe") {
          Write-Host "✅ ProjectEyeUp.exe 构建成功"
        } else {
          Write-Host "❌ ProjectEyeUp.exe 构建失败"
        }
      continue-on-error: false
    
    - name: 收集构建产物
      run: |
        # 创建发布目录
        mkdir release
        
        # 复制主程序文件
        $buildPath = if ("${{ github.event.inputs.build_type }}" -eq "") { "Release" } else { "${{ github.event.inputs.build_type }}" }
        
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/ProjectEye.exe" release/
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/ProjectEye.exe.config" release/ -ErrorAction SilentlyContinue
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/Project1.UI.dll" release/ -ErrorAction SilentlyContinue
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/ProjectEyeUp.exe" release/ -ErrorAction SilentlyContinue
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/ProjectEyeBug.exe" release/ -ErrorAction SilentlyContinue
        
        # 复制依赖库
        Copy-Item "src/Local/ProjectEye/bin/$buildPath/*.dll" release/ -ErrorAction SilentlyContinue
        
        # 复制其他必要文件
        Copy-Item "README.md" release/ -ErrorAction SilentlyContinue
        Copy-Item "LICENSE" release/ -ErrorAction SilentlyContinue
        
        # 显示文件列表
        Get-ChildItem release/
    
    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: ProjectEye-${{ github.sha }}
        path: release/
        retention-days: 90
    
    - name: 创建发布包
      if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
      run: |
        Compress-Archive -Path release/* -DestinationPath ProjectEye.zip
    
    - name: 创建GitHub Release (Tag触发)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ProjectEye.zip
        body: |
          ## ProjectEye ${{ github.ref_name }}
          
          ### 新功能与改进
          - 📝 请在此处添加版本更新说明
          
          ### 下载说明
          - 下载 `ProjectEye.zip` 并解压
          - 运行 `ProjectEye.exe` 即可使用
          - 需要 .NET Framework 4.5+ 运行环境
          
          ### 运行环境
          - Windows 7/10/11
          - .NET Framework 4.5+
          
          ---
          🤖 自动构建于 GitHub Actions
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 创建GitHub Release (手动触发)
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.release_tag || format('manual-{0}', github.sha) }}
        name: ProjectEye ${{ github.event.inputs.release_tag || format('manual-{0}', github.sha) }}
        files: ProjectEye.zip
        body: |
          ## ProjectEye 手动发布版本
          
          ### 构建信息
          - 构建类型: ${{ github.event.inputs.build_type }}
          - 构建分支: ${{ github.ref_name }}
          - 构建提交: ${{ github.sha }}
          
          ### 下载说明
          - 下载 `ProjectEye.zip` 并解压
          - 运行 `ProjectEye.exe` 即可使用
          - 需要 .NET Framework 4.5+ 运行环境
          
          ### 运行环境
          - Windows 7/10/11
          - .NET Framework 4.5+
          
          ---
          🤖 手动触发构建于 GitHub Actions
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notification:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: 构建状态通知
      run: |
        if [ "${{ needs.build.result }}" = "success" ]; then
          echo "✅ ProjectEye 构建成功！"
          echo "📦 构建产物已上传到 Actions 页面"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ] || [ "${{ github.event.inputs.create_release }}" = "true" ]; then
            echo "🚀 Release 已创建"
          fi
        else
          echo "❌ ProjectEye 构建失败"
          echo "📝 请检查构建日志"
        fi