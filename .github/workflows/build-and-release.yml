name: Build and Release ProjectEye

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET Framework
      uses: microsoft/setup-msbuild@v2
      
    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      with:
        nuget-version: 'latest'
        
    - name: Restore NuGet packages
      run: |
        nuget restore src/Local/ProjectEye/ProjectEye.Local.sln
        
    - name: Build solution
      run: |
        msbuild src/Local/ProjectEye/ProjectEye.Local.sln /p:Configuration=Release /p:Platform="Any CPU"
        
    - name: Create release package
      run: |
        mkdir release
        copy src\Local\ProjectEye\bin\Release\* release\ /Y
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ProjectEye-Release
        path: release/
        retention-days: 30
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}